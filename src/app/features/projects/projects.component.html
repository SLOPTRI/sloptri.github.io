<section class="projects-section container">
  <h2 class="section-title text-neon code-font">>&nbsp;Project_Showcase</h2>
  
  <div class="projects-grid">
    @for (project of projects(); track project.id) {
      <div class="project-card glass-panel group">
        <h3 class="project-title">{{ project.title }}</h3>
        <span class="project-type text-java code-font">{{ project.type }}</span>
        
        <p class="project-desc text-muted mt-2">{{ project.description }}</p>
        
        <div class="stack-tags mt-2">
          @for (tech of project.stack; track tech) {
            <span class="tag code-font">{{ tech }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>
